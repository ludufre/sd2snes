; sd2snes companion - one Arduino codebase, three targets (ESP32 / ESP8266 / ESP32-C3).
; Build all:     ~/.platformio/penv/bin/pio run
; Build one:     ~/.platformio/penv/bin/pio run -e esp32dev   (or -e nodemcuv2 / -e esp32-c3-supermini)
; Flash:         ~/.platformio/penv/bin/pio run -e <env> -t upload
; ESP8266 .bin:  .pio/build/nodemcuv2/firmware.bin  (flash at 0x00000 w/ PyFlasher)
;
; Wiring (MCU UART link side identical; only the ESP pins differ):
;   ESP32:    MCU P0.2 TXD0 -> GPIO16 (RX2),  MCU P0.3 RXD0 -> GPIO17 (TX2)
;   ESP8266:  MCU P0.2 TXD0 -> D7/GPIO13,     MCU P0.3 RXD0 -> D8/GPIO15  (UART0 swapped)
;   ESP32-C3: MCU P0.2 TXD0 -> GPIO20 (RX1),  MCU P0.3 RXD0 -> GPIO21 (TX1)
; ST7789 1.54" display pins are per-chip in src/platform.h (TFT_* macros).
[env]
framework = arduino
monitor_speed = 115200
extra_scripts = post:tools/append_fwtrailer.py   ; embeds FW_VERSION at the end of firmware.bin
lib_deps =
    adafruit/Adafruit ST7735 and ST7789 Library   ; ships Adafruit_ST7789.h
    adafruit/Adafruit GFX Library
    adafruit/Adafruit BusIO

[env:esp32dev]
platform = espressif32
board = esp32dev

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
board_build.f_cpu = 160000000L        ; helps the 921600 UART under WiFi load
build_flags =
    -DPIO_FRAMEWORK_ARDUINO_LWIP2_HIGHER_BANDWIDTH

[env:esp32-c3-supermini]
platform = espressif32
board = esp32-c3-devkitm-1            ; generic 4MB C3, fits the Super Mini
build_flags =
    -DARDUINO_USB_MODE=1             ; route Serial to the native USB-CDC (debug console)
    -DARDUINO_USB_CDC_ON_BOOT=1
